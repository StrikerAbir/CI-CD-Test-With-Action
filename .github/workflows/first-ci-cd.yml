name: Test Application

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          mkdir -p test-results
          npm run check > test-results/results.txt 2>&1 || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  deploy:
    runs-on: self-hosted
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy Application
      run: |
        set -euo pipefail

        mkdir -p deploy-results

        {
          echo "======================================"
          echo "🚀 Deployment Started: $(date)"
          echo "======================================"

          # -------------------------------
          # Setup NVM
          # -------------------------------
          export NVM_DIR="$HOME/.nvm"

          if [ ! -d "$NVM_DIR" ]; then
            echo "Installing NVM..."
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
          fi

          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          # -------------------------------
          # Use Node.js 22
          # -------------------------------
          nvm use 22 || nvm install 22
          nvm alias default 22

          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"


          # Install PM2
          # -------------------------------
          if ! command -v pm2 >/dev/null 2>&1; then
            echo "Installing PM2..."
            npm install -g pm2
            pm2 startup systemd -u $USER --hp $HOME
          fi

          
          # Install dependencies
          # -------------------------------
          echo "Installing dependencies..."
          npm ci --omit=dev

          # Start / Restart App
          # -------------------------------
          if pm2 describe node-app >/dev/null 2>&1; then
            echo "Restarting app..."
            pm2 restart node-app
          else
            echo "Starting app..."
            pm2 start src/server.js --name node-app
          fi

          pm2 save

          echo "Deployment Successful..."

        } > deploy-results/deploy-log.txt 2>&1

    - name: Upload deploy logs
      uses: actions/upload-artifact@v4
      with:
        name: deploy-results
        path: deploy-results/
