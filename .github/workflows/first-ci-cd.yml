name: Test Application

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          mkdir -p test-results
          npm run check > test-results/results.txt 2>&1 || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          
  deploy:
   runs-on: self-hosted
      
   steps:
    - name: Deploy to EC2
      run: |
        ssh -o BatchMode=yes -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          echo "Starting deployment..."

          mkdir -p ~/app
          cd ~/app

          if [ ! -d ".git" ]; then
            git clone https://github.com/StrikerAbir/CI-CD-Test-With-Action.git .
          else
            git pull origin main
          fi

          npm install

          # Prevent reload issues
          if pm2 list | grep -q "node-app"; then
            pm2 restart node-app
          else
            pm2 start src/server.js --name node-app
          fi

          pm2 save

          echo "Deployment complete."
        EOF
          
   
